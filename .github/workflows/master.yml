name: Deploy
on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20.13.1'
      - name: Install
        run: |
          yarn
      - name: Lint
        run: |
          yarn lint
      - name: Tests
        run: |
          yarn test
      - name: Visual Regression Tests
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-0 libwebkit2gtk-4.0-37 libwoff1 libharfbuzz-icu0 \
            libgstreamer-plugins-base1.0-0 libgstreamer-gl1.0-0 libgstreamer1.0-0 \
            libegl1 libopus0 libxslt1.1 libgstreamer-plugins-bad1.0-0 \
            libgstreamer-plugins-good1.0-0 libvpx7 libenchant-2-2 libsecret-1-0 \
            libhyphen0 libmanette-0.2-0
          npx playwright install
          yarn test-visual
      - name: Build
        run: |
          yarn build
      - name: Publish
        env:
          DIGITALOCEAN_API_TOKEN: ${{ secrets.DIGITALOCEAN_API_TOKEN }}
        run: |
          export APP_NAME=fikasio-client
          export IMAGE_NAME=registry.digitalocean.com/samdouble/$APP_NAME
          docker build -t $IMAGE_NAME -f Dockerfile.prod .
          docker login -u $DIGITALOCEAN_API_TOKEN -p $DIGITALOCEAN_API_TOKEN registry.digitalocean.com
          docker push $IMAGE_NAME
